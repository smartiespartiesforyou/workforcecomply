<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | WorkforceComply</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: Arial; background:#f8fafc; }
#gate {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:flex;
  align-items:center;
  justify-content:center;
}
.box {
  background:white;
  padding:30px;
  border-radius:10px;
  width:300px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="gate">
  <div class="box">
    <h2>Login</h2>
    <div id="error" style="color:red;margin-bottom:10px;"></div>

    <input id="email" placeholder="Email" style="width:100%;margin-bottom:10px;">
    <input id="password" type="password" placeholder="Password" style="width:100%;margin-bottom:10px;">

    <button onclick="login()" style="width:100%;">Sign In</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="app" style="display:none;padding:20px;">
  <h1>Dashboard</h1>
  <div id="user"></div>
  <button onclick="logout()">Logout</button>
</div>

<!-- MEMBERSTACK -->
<script data-memberstack-app="app_cmnhnat7r001d0susf7cy5mlo" src="https://static.memberstack.com/scripts/v1/memberstack.js"></script>

<script>
let ms = null;

document.addEventListener("DOMContentLoaded", async () => {
  try {
    if (!window.$memberstackDom) throw new Error("Memberstack failed to load");

    ms = window.$memberstackDom;

    const { data: member } = await ms.getCurrentMember();

    if (member) {
      showApp(member);
    } else {
      showLogin();
    }

  } catch (e) {
    console.error(e);
    document.getElementById("error").innerText = e.message;
    showLogin();
  }
});

function showLogin() {
  document.getElementById("gate").style.display = "flex";
  document.getElementById("app").style.display = "none";
}

function showApp(member) {
  document.getElementById("gate").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("user").innerText = member.email || "";
}

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await ms.loginMemberEmailPassword({ email, password });

    const { data } = await ms.getCurrentMember();
    showApp(data);

  } catch (e) {
    document.getElementById("error").innerText = e.message;
  }
}

async function logout() {
  await ms.logout();
  location.reload();
}
</script>

</body>
</html>
