<!DOCTYPE html>
<html lang="en">
<head>

<script
  data-memberstack-app="app_cmnhnat7r001d0susf7cy5mlo"
  src="https://static.memberstack.com/scripts/v2/memberstack.js"
  type="text/javascript">
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkforceComply App</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-50 text-slate-900">

<!-- PAID USERS ONLY -->
<div data-ms-content="paid-plans" class="min-h-screen flex flex-col items-center justify-center text-center px-6">

    <h1 class="text-3xl font-bold mb-4">Run Compliance Checks</h1>

    <p class="text-slate-600 mb-6">
        Upload your Excel file to run checks.
    </p>

    <div class="bg-white p-8 rounded-xl shadow-lg max-w-xl w-full">

        <input id="fileInput" type="file" class="mb-4 w-full border p-2 rounded">

        <button onclick="runChecks()"
            class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded w-full">
            Run Checks
        </button>

        <div id="result" class="mt-6 text-left text-sm text-slate-700"></div>

    </div>

</div>

<!-- NON-PAID USERS -->
<div data-ms-content="!paid-plans" class="min-h-screen flex items-center justify-center px-6">

    <div class="bg-white p-8 rounded-xl shadow-lg text-center max-w-md">
        <h2 class="text-2xl font-bold mb-4">Access Restricted</h2>

        <p class="text-slate-600 mb-6">
            You need an active subscription to use WorkforceComply.
        </p>

        <a href="pricing.html"
           class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-lg text-white font-bold">
            View Pricing
        </a>
    </div>

</div>

<script>
async function runChecks() {
    const file = document.getElementById("fileInput").files[0];

    if (!file) {
        alert("Please upload a file first.");
        return;
    }

    const formData = new FormData();
    formData.append("file", file);

    try {
        const response = await fetch("https://workforcecomply-backend.onrender.com/api/run-checks", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        if (!response.ok) {
            throw new Error(data.error || "Something went wrong");
        }

        document.getElementById("result").innerHTML = `
            <p><strong>Total:</strong> ${data.summary.total_employees}</p>
            <p><strong>Clear:</strong> ${data.summary.clear_count}</p>
            <p><strong>Flagged:</strong> ${data.summary.attention_needed}</p>
            <br>
            <a href="${data.downloads.combined_pdf_url}" target="_blank"
               class="text-blue-600 underline">
               Download Combined PDF
            </a>
        `;

    } catch (err) {
        alert("Error: " + err.message);
    }
}
</script>

</body>
</html>
