<!DOCTYPE html>
<html lang="en">
<head>

<script
  data-memberstack-app="app_cmnhnat7r001d0susf7cy5mlo"
  src="https://static.memberstack.com/scripts/v2/memberstack.js"
  type="text/javascript">
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkforceComply App</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
  [data-ms-content] {
    display: none;
  }
</style>

</head>

<body class="bg-gray-50 text-slate-900">

<div data-ms-content="Admin Access" class="min-h-screen flex flex-col items-center justify-center text-center px-6">

    <h1 class="text-3xl font-bold mb-4">Run Compliance Checks</h1>

    <p class="text-slate-600 mb-6">
        Upload your Excel file to run checks.
    </p>

    <div class="bg-white p-8 rounded-xl shadow-lg max-w-xl w-full">

        <input id="fileInput" type="file" class="mb-4 w-full border p-2 rounded">

        <button id="runBtn" onclick="runChecks()"
            class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded w-full">
            Run Checks
        </button>

        <div id="statusBox" class="mt-4 text-sm text-left text-slate-700"></div>
        <div id="result" class="mt-6 text-left text-sm text-slate-700"></div>

    </div>

</div>

<div data-ms-content="!Admin Access" class="min-h-screen flex items-center justify-center px-6">

    <div class="bg-white p-8 rounded-xl shadow-lg text-center max-w-md">
        <h2 class="text-2xl font-bold mb-4">Access Restricted</h2>

        <p class="text-slate-600 mb-6">
            You need an active subscription to use WorkforceComply.
        </p>

        <a href="pricing.html"
           class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-lg text-white font-bold">
            View Pricing
        </a>
    </div>

</div>

<script>
async function runChecks() {
    const file = document.getElementById("fileInput").files[0];
    const runBtn = document.getElementById("runBtn");
    const statusBox = document.getElementById("statusBox");
    const resultBox = document.getElementById("result");

    resultBox.innerHTML = "";
    statusBox.innerHTML = "";

    if (!file) {
        statusBox.innerHTML = '<p class="text-red-600">Please upload a file first.</p>';
        return;
    }

    console.log("Sending request to backend...");

    runBtn.disabled = true;
    runBtn.textContent = "Running...";
    statusBox.innerHTML = '<p class="text-blue-600">Processing... please wait.</p>';

    const formData = new FormData();
    formData.append("file", file);

    try {
        const response = await fetch("https://workforcecomply.onrender.com/api/run-checks", {
            method: "POST",
            body: formData,
            mode: "cors"
        });

        const text = await response.text();
        console.log("RAW RESPONSE:", text);

        let data;
        try {
            data = JSON.parse(text);
        } catch {
            throw new Error("Backend crashed or returned invalid response.");
        }

        if (!response.ok) {
            throw new Error(data.error || "Processing failed.");
        }

        statusBox.innerHTML = '<p class="text-green-600">Checks completed successfully.</p>';

        resultBox.innerHTML = `
            <p><strong>Total:</strong> ${data.summary.total_employees}</p>
            <p><strong>Clear:</strong> ${data.summary.clear_count}</p>
            <p><strong>Flagged:</strong> ${data.summary.attention_needed}</p>
            <br>
            <a href="${data.downloads.combined_pdf_url}" target="_blank" class="text-blue-600 underline block mb-2">
               Download Combined PDF
            </a>
            <a href="${data.downloads.individual_zip_url}" target="_blank" class="text-blue-600 underline block mb-2">
               Download Individual PDFs ZIP
            </a>
            <a href="${data.downloads.results_excel_url}" target="_blank" class="text-blue-600 underline block">
               Download Results Excel
            </a>
        `;
    } catch (err) {
        statusBox.innerHTML = `<p class="text-red-600"><strong>Error:</strong> ${err.message}</p>`;
    } finally {
        runBtn.disabled = false;
        runBtn.textContent = "Run Checks";
    }
}
</script>

</body>
</html>
