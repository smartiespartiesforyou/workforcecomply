<!DOCTYPE html>
<html lang="en">
<head>

<script
  data-memberstack-app="app_cmnhnat7r001d0susf7cy5mlo"
  src="https://static.memberstack.com/scripts/v2/memberstack.js"
  type="text/javascript">
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkforceComply App</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
  [data-ms-content] {
    display: none;
  }
</style>

</head>

<body class="bg-gray-50 text-slate-900">

<div data-ms-content="Admin Access" class="min-h-screen flex flex-col items-center justify-center px-6 py-12">

    <div class="w-full max-w-3xl">
        <h1 class="text-3xl font-bold mb-3 text-center">Run Compliance Checks</h1>

        <p class="text-slate-600 mb-8 text-center">
            Upload your Excel file to run checks and download your audit package.
        </p>

        <div class="bg-white p-8 rounded-xl shadow-lg w-full">
            <label for="fileInput" class="block text-sm font-semibold text-slate-700 mb-2">
                Upload Excel File
            </label>

            <input
                id="fileInput"
                type="file"
                accept=".xlsx,.xls"
                class="mb-2 w-full border border-slate-300 p-3 rounded-lg"
            >

            <div id="fileName" class="text-sm text-slate-500 mb-5">No file selected</div>

            <button
                id="runBtn"
                type="button"
                onclick="runChecks()"
                class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-3 rounded-lg w-full font-semibold transition"
            >
                Run Checks
            </button>

            <div id="statusBox" class="mt-5 text-sm text-left text-slate-700"></div>
            <div id="result" class="mt-6 text-left text-sm text-slate-700"></div>

            <div id="downloadSection" class="mt-6 hidden">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                    <a
                        id="combinedPdfBtn"
                        href="#"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="hidden bg-slate-900 hover:bg-slate-800 text-white text-center px-4 py-3 rounded-lg font-semibold transition"
                    >
                        Download Combined PDF
                    </a>

                    <a
                        id="zipBtn"
                        href="#"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="hidden bg-blue-600 hover:bg-blue-700 text-white text-center px-4 py-3 rounded-lg font-semibold transition"
                    >
                        Download Audit ZIP
                    </a>

                    <a
                        id="excelBtn"
                        href="#"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="hidden bg-emerald-600 hover:bg-emerald-700 text-white text-center px-4 py-3 rounded-lg font-semibold transition"
                    >
                        Download Results Excel
                    </a>
                </div>
            </div>
        </div>
    </div>

</div>

<div data-ms-content="!Admin Access" class="min-h-screen flex items-center justify-center px-6">

    <div class="bg-white p-8 rounded-xl shadow-lg text-center max-w-md">
        <h2 class="text-2xl font-bold mb-4">Access Restricted</h2>

        <p class="text-slate-600 mb-6">
            You need an active subscription to use WorkforceComply.
        </p>

        <a
           href="pricing.html"
           class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-lg text-white font-bold inline-block">
            View Pricing
        </a>
    </div>

</div>

<script>
const fileInput = document.getElementById("fileInput");
const fileName = document.getElementById("fileName");
const runBtn = document.getElementById("runBtn");
const statusBox = document.getElementById("statusBox");
const resultBox = document.getElementById("result");
const downloadSection = document.getElementById("downloadSection");
const combinedPdfBtn = document.getElementById("combinedPdfBtn");
const zipBtn = document.getElementById("zipBtn");
const excelBtn = document.getElementById("excelBtn");

fileInput.addEventListener("change", () => {
    if (fileInput.files.length > 0) {
        fileName.textContent = fileInput.files[0].name;
    } else {
        fileName.textContent = "No file selected";
    }
});

function resetDownloads() {
    downloadSection.classList.add("hidden");

    combinedPdfBtn.classList.add("hidden");
    zipBtn.classList.add("hidden");
    excelBtn.classList.add("hidden");

    combinedPdfBtn.href = "#";
    zipBtn.href = "#";
    excelBtn.href = "#";
}

function formatRuntime(ms) {
    const totalSeconds = ms / 1000;

    if (totalSeconds < 60) {
        return `${totalSeconds.toFixed(1)} seconds`;
    }

    const minutes = Math.floor(totalSeconds / 60);
    const seconds = (totalSeconds % 60).toFixed(1);
    return `${minutes} min ${seconds} sec`;
}

async function runChecks() {
    const file = fileInput.files[0];

    resultBox.innerHTML = "";
    statusBox.innerHTML = "";
    resetDownloads();

    if (!file) {
        statusBox.innerHTML = '<p class="text-red-600 font-medium">Please upload a file first.</p>';
        return;
    }

    runBtn.disabled = true;
    runBtn.textContent = "Running...";
    runBtn.classList.add("opacity-60", "cursor-not-allowed");

    statusBox.innerHTML = '<p class="text-blue-600 font-medium">Processing... please wait.</p>';

    const formData = new FormData();
    formData.append("file", file);

    const startTime = performance.now();

    try {
        const response = await fetch("https://workforcecomply-backend-docker.onrender.com/api/run-checks", {
            method: "POST",
            body: formData,
            mode: "cors"
        });

        const text = await response.text();

        let data;
        try {
            data = JSON.parse(text);
        } catch {
            throw new Error("Backend crashed or returned invalid response.");
        }

        if (!response.ok) {
            throw new Error(data.error || "Processing failed.");
        }

        const endTime = performance.now();
        const runtime = formatRuntime(endTime - startTime);

        statusBox.innerHTML = `
            <p class="text-green-600 font-medium">Checks completed successfully.</p>
            <p class="text-slate-600 mt-1">Completed in ${runtime}</p>
        `;

        resultBox.innerHTML = `
            <div class="border border-slate-200 rounded-lg p-4 bg-slate-50">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 text-center">
                    <div>
                        <div class="text-xs uppercase tracking-wide text-slate-500">Total</div>
                        <div class="text-2xl font-bold text-slate-900">${data.summary.total_employees}</div>
                    </div>
                    <div>
                        <div class="text-xs uppercase tracking-wide text-slate-500">Clear</div>
                        <div class="text-2xl font-bold text-emerald-600">${data.summary.clear_count}</div>
                    </div>
                    <div>
                        <div class="text-xs uppercase tracking-wide text-slate-500">Flagged</div>
                        <div class="text-2xl font-bold text-red-600">${data.summary.attention_needed}</div>
                    </div>
                    <div>
                        <div class="text-xs uppercase tracking-wide text-slate-500">Runtime</div>
                        <div class="text-xl font-bold text-slate-900">${runtime}</div>
                    </div>
                </div>
            </div>
        `;

        if (data.downloads.combined_pdf_url) {
            combinedPdfBtn.href = data.downloads.combined_pdf_url;
            combinedPdfBtn.classList.remove("hidden");
        }

        if (data.downloads.individual_zip_url) {
            zipBtn.href = data.downloads.individual_zip_url;
            zipBtn.classList.remove("hidden");
        }

        if (data.downloads.results_excel_url) {
            excelBtn.href = data.downloads.results_excel_url;
            excelBtn.classList.remove("hidden");
        }

        downloadSection.classList.remove("hidden");

    } catch (err) {
        const endTime = performance.now();
        const runtime = formatRuntime(endTime - startTime);

        statusBox.innerHTML = `
            <p class="text-red-600 font-medium">Error: ${err.message}</p>
            <p class="text-slate-600 mt-1">Stopped after ${runtime}</p>
        `;
    } finally {
        runBtn.disabled = false;
        runBtn.textContent = "Run Checks";
        runBtn.classList.remove("opacity-60", "cursor-not-allowed");
    }
}
</script>

</body>
</html>
