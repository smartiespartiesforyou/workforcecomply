<!DOCTYPE html>
<html lang="en">
<head>

<script
  data-memberstack-app="app_cmnhnat7r001d0susf7cy5mlo"
  src="https://static.memberstack.com/scripts/v2/memberstack.js"
  type="text/javascript">
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkforceComply App</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
  [data-ms-content] { display: none; }
</style>

</head>

<body class="bg-slate-100 text-slate-900">

<!-- MAIN APP -->
<div data-ms-content="paid-members" class="min-h-screen px-6 py-10">

    <div class="max-w-5xl mx-auto">
        <div class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold">WorkforceComply</h1>
            <p class="text-slate-600 mt-2">
                Run compliance checks individually.
            </p>
        </div>

        <div class="bg-white rounded-2xl shadow p-6">

            <input id="fileInput" type="file" class="mb-4 w-full border p-3 rounded">

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <button onclick="runChecks('oig')" class="bg-black text-white p-4 rounded">Run OIG</button>
                <button onclick="runChecks('cna')" class="bg-green-600 text-white p-4 rounded">Run CNA</button>
                <button onclick="runChecks('adverse')" class="bg-yellow-600 text-white p-4 rounded">Run DSW</button>
            </div>

            <div id="status" class="mb-4 text-sm text-gray-600"></div>

            <div id="summary" class="hidden mb-4">
                <p>Total: <span id="total"></span></p>
                <p>Clear: <span id="clear"></span></p>
                <p>Issues: <span id="flagged"></span></p>
                <p>Runtime: <span id="runtime"></span></p>
            </div>

            <div id="downloads" class="hidden space-y-2">
                <a id="zip" class="block bg-blue-600 text-white p-3 rounded text-center">Download ZIP</a>
                <a id="excel" class="block bg-green-700 text-white p-3 rounded text-center">Download Excel</a>
            </div>

        </div>
    </div>
</div>

<!-- NOT PAID -->
<div data-ms-content="!paid-members" class="min-h-screen flex items-center justify-center">

    <div class="bg-white p-6 rounded shadow text-center">
        <h2 class="text-xl font-bold mb-3">Access Restricted</h2>
        <p class="mb-4">You need a subscription.</p>
        <a href="pricing.html" class="bg-blue-600 text-white px-4 py-2 rounded">View Pricing</a>
    </div>

</div>

<script>
async function runChecks(type) {

    const file = document.getElementById("fileInput").files[0];
    if (!file) {
        alert("Upload file first");
        return;
    }

    document.getElementById("status").innerText = "Running...";
    document.getElementById("summary").classList.add("hidden");
    document.getElementById("downloads").classList.add("hidden");

    const formData = new FormData();
    formData.append("file", file);

    const start = performance.now();

    let endpoint = "";
    if (type === "oig") endpoint = "/api/run-oig";
    if (type === "cna") endpoint = "/api/run-cna";
    if (type === "adverse") endpoint = "/api/run-adverse";

    const res = await fetch("https://workforcecomply-backend-docker.onrender.com" + endpoint, {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    const end = performance.now();

    document.getElementById("status").innerText = "Complete";

    document.getElementById("summary").classList.remove("hidden");
    document.getElementById("total").innerText = data.summary.total_employees;
    document.getElementById("clear").innerText = data.summary.clear_count;
    document.getElementById("flagged").innerText = data.summary.attention_needed;
    document.getElementById("runtime").innerText = ((end - start)/1000).toFixed(1) + " sec";

    document.getElementById("downloads").classList.remove("hidden");

    document.getElementById("zip").href = data.downloads.combined_pdf_url;
    document.getElementById("excel").href = data.downloads.results_excel_url;
}
</script>

</body>
</html>
