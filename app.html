<!DOCTYPE html>
<html lang="en">
<head>

<script
  data-memberstack-app="app_cmnhnat7r001d0susf7cy5mlo"
  src="https://static.memberstack.com/scripts/v2/memberstack.js"
  type="text/javascript">
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkforceComply App</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
[data-ms-content] { display: none; }
</style>

</head>

<body class="bg-gray-50 text-slate-900">

<div data-ms-content="Admin Access" class="min-h-screen flex flex-col items-center justify-center px-6 py-12">

<div class="w-full max-w-3xl">

<h1 class="text-3xl font-bold mb-3 text-center">Run Compliance Checks</h1>

<p class="text-slate-600 mb-8 text-center">
Upload your Excel file to run checks and download your audit package.
</p>

<div class="bg-white p-8 rounded-xl shadow-lg w-full">

<input id="fileInput" type="file" accept=".xlsx,.xls"
class="mb-2 w-full border p-3 rounded-lg">

<div id="fileName" class="text-sm text-slate-500 mb-5">No file selected</div>

<div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">

<button id="runAllBtn" onclick="runChecks('all')"
class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-3 rounded-lg font-semibold">
Run All Checks
</button>

<button id="runOigBtn" onclick="runChecks('oig')"
class="bg-slate-900 hover:bg-slate-800 text-white px-4 py-3 rounded-lg font-semibold">
OIG Only
</button>

<button id="runCnaBtn" onclick="runChecks('cna')"
class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-3 rounded-lg font-semibold">
CNA Only
</button>

</div>

<div id="statusBox" class="mt-4 text-sm"></div>
<div id="resultBox" class="mt-4 text-sm"></div>

<div id="downloadSection" class="mt-6 hidden">

<a id="zipBtn" class="block mb-3 bg-blue-600 text-white p-3 rounded-lg text-center" target="_blank">
Download ZIP
</a>

<a id="excelBtn" class="block bg-emerald-700 text-white p-3 rounded-lg text-center" target="_blank">
Download Results Excel
</a>

</div>

</div>
</div>
</div>

<script>

const fileInput = document.getElementById("fileInput");
const fileName = document.getElementById("fileName");
const statusBox = document.getElementById("statusBox");
const resultBox = document.getElementById("resultBox");
const downloadSection = document.getElementById("downloadSection");
const zipBtn = document.getElementById("zipBtn");
const excelBtn = document.getElementById("excelBtn");

fileInput.addEventListener("change", () => {
fileName.textContent = fileInput.files.length ? fileInput.files[0].name : "No file selected";
});

function getEndpoint(mode) {
if (mode === "oig") return "/api/run-oig";
if (mode === "cna") return "/api/run-cna";
return "/api/run-checks";
}

async function runChecks(mode) {

const file = fileInput.files[0];

if (!file) {
statusBox.innerHTML = "Upload a file first.";
return;
}

statusBox.innerHTML = "Running... please wait";
resultBox.innerHTML = "";
downloadSection.classList.add("hidden");

const formData = new FormData();
formData.append("file", file);

try {

const response = await fetch("https://workforcecomply-backend-docker.onrender.com" + getEndpoint(mode), {
method: "POST",
body: formData
});

const data = await response.json();

if (!response.ok) throw new Error(data.error || "Failed");

statusBox.innerHTML = "Completed";

resultBox.innerHTML = `
Total: ${data.summary.total_employees} |
Clear: ${data.summary.clear_count} |
Flagged: ${data.summary.attention_needed}
`;

zipBtn.href = data.downloads.combined_pdf_url;
excelBtn.href = data.downloads.results_excel_url;

downloadSection.classList.remove("hidden");

} catch (err) {
statusBox.innerHTML = "Error: " + err.message;
}

}

</script>

</body>
</html>
