<!DOCTYPE html>
<html lang="en">
<head>

<script
  data-memberstack-app="app_cmnhnat7r001d0susf7cy5mlo"
  src="https://static.memberstack.com/scripts/v2/memberstack.js"
  type="text/javascript">
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkforceComply App</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
  [data-ms-content] { display: none; }
</style>

</head>

<body class="bg-gray-50 text-slate-900">

<div data-ms-content="Admin Access" class="min-h-screen flex flex-col items-center justify-center px-6 py-12">

    <div class="w-full max-w-3xl">
        <h1 class="text-3xl font-bold mb-3 text-center">Run Compliance Checks</h1>

        <p class="text-slate-600 mb-8 text-center">
            Upload your Excel file to run checks and download your audit package.
        </p>

        <div class="bg-white p-8 rounded-xl shadow-lg w-full">

            <label class="block text-sm font-semibold text-slate-700 mb-2">
                Upload Excel File
            </label>

            <input
                id="fileInput"
                type="file"
                accept=".xlsx,.xls"
                class="mb-2 w-full border border-slate-300 p-3 rounded-lg"
            >

            <div id="fileName" class="text-sm text-slate-500 mb-5">No file selected</div>

            <button
                id="runBtn"
                type="button"
                onclick="runChecks()"
                class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-3 rounded-lg w-full font-semibold transition"
            >
                Run All Checks
            </button>

            <div id="statusBox" class="mt-5 text-sm text-left text-slate-700"></div>
            <div id="result" class="mt-6 text-left text-sm text-slate-700"></div>

            <div id="downloadSection" class="mt-6 hidden">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">

                    <a
                        id="zipBtn"
                        href="#"
                        target="_blank"
                        class="hidden bg-blue-600 hover:bg-blue-700 text-white text-center px-4 py-3 rounded-lg font-semibold transition"
                    >
                        Download ZIP
                    </a>

                    <a
                        id="excelBtn"
                        href="#"
                        target="_blank"
                        class="hidden bg-emerald-700 hover:bg-emerald-800 text-white text-center px-4 py-3 rounded-lg font-semibold transition"
                    >
                        Download Results Excel
                    </a>

                </div>
            </div>

        </div>
    </div>

</div>

<div data-ms-content="!Admin Access" class="min-h-screen flex items-center justify-center px-6">

    <div class="bg-white p-8 rounded-xl shadow-lg text-center max-w-md">
        <h2 class="text-2xl font-bold mb-4">Access Restricted</h2>

        <p class="text-slate-600 mb-6">
            You need an active subscription to use WorkforceComply.
        </p>

        <a
           href="pricing.html"
           class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-lg text-white font-bold inline-block">
            View Pricing
        </a>
    </div>

</div>

<script>
const fileInput = document.getElementById("fileInput");
const fileName = document.getElementById("fileName");
const runBtn = document.getElementById("runBtn");
const statusBox = document.getElementById("statusBox");
const resultBox = document.getElementById("result");
const downloadSection = document.getElementById("downloadSection");
const zipBtn = document.getElementById("zipBtn");
const excelBtn = document.getElementById("excelBtn");

fileInput.addEventListener("change", () => {
    fileName.textContent = fileInput.files.length > 0
        ? fileInput.files[0].name
        : "No file selected";
});

function setRunning(state) {
    runBtn.disabled = state;

    if (state) {
        runBtn.classList.add("opacity-60", "cursor-not-allowed");
        runBtn.textContent = "Running...";
    } else {
        runBtn.classList.remove("opacity-60", "cursor-not-allowed");
        runBtn.textContent = "Run All Checks";
    }
}

function resetDownloads() {
    downloadSection.classList.add("hidden");
    zipBtn.classList.add("hidden");
    excelBtn.classList.add("hidden");
}

function formatRuntime(seconds) {
    if (seconds < 60) return `${seconds.toFixed(1)} seconds`;
    const m = Math.floor(seconds / 60);
    const s = (seconds % 60).toFixed(1);
    return `${m}m ${s}s`;
}

async function runChecks() {
    const file = fileInput.files[0];

    statusBox.innerHTML = "";
    resultBox.innerHTML = "";
    resetDownloads();

    if (!file) {
        statusBox.innerHTML = '<p class="text-red-600">Upload a file first.</p>';
        return;
    }

    setRunning(true);

    statusBox.innerHTML = `<p class="text-blue-600">Running checks... please wait.</p>`;

    const formData = new FormData();
    formData.append("file", file);

    try {
        const response = await fetch(
            "https://workforcecomply-backend-docker.onrender.com/api/run-checks",
            {
                method: "POST",
                body: formData
            }
        );

        const data = await response.json();

        if (!response.ok) {
            throw new Error(data.error || "Processing failed");
        }

        const runtime = formatRuntime(data.summary.runtime_seconds);

        statusBox.innerHTML = `
            <p class="text-green-600">Completed successfully</p>
            <p class="text-slate-600 mt-1">${runtime}</p>
        `;

        resultBox.innerHTML = `
            <div class="border rounded-lg p-4 bg-slate-50">
                <div class="grid grid-cols-3 text-center gap-4">
                    <div>
                        <div class="text-xs text-slate-500">Total</div>
                        <div class="text-2xl font-bold">${data.summary.total_employees}</div>
                    </div>
                    <div>
                        <div class="text-xs text-slate-500">Clear</div>
                        <div class="text-2xl font-bold text-emerald-600">${data.summary.clear_count}</div>
                    </div>
                    <div>
                        <div class="text-xs text-slate-500">Flagged</div>
                        <div class="text-2xl font-bold text-red-600">${data.summary.attention_needed}</div>
                    </div>
                </div>
            </div>
        `;

        zipBtn.href = data.downloads.combined_pdf_url;
        zipBtn.classList.remove("hidden");

        excelBtn.href = data.downloads.results_excel_url;
        excelBtn.classList.remove("hidden");

        downloadSection.classList.remove("hidden");

    } catch (err) {
        statusBox.innerHTML = `<p class="text-red-600">${err.message}</p>`;
    } finally {
        setRunning(false);
    }
}
</script>

</body>
</html>
