<!DOCTYPE html>
<html lang="en">
<head>

<script
  data-memberstack-app="app_cmnhnat7r001d0susf7cy5mlo"
  src="https://static.memberstack.com/scripts/v2/memberstack.js"
  type="text/javascript">
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkforceComply App</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; }

.soft-card {
  background: white;
  border: 1px solid #e5e7eb;
  border-radius: 18px;
  box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
}

.check-card {
  border-radius: 16px;
  padding: 1rem;
  text-align: left;
  font-weight: 600;
  transition: all 0.2s ease;
  box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
}

.check-card:hover {
  transform: translateY(-2px);
}

.check-card:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}
</style>

</head>

<body class="bg-slate-100 text-slate-900">

<div class="min-h-screen px-6 py-10">

    <div class="max-w-5xl mx-auto">

        <div class="text-center mb-8">
            <p class="text-sm uppercase tracking-[0.25em] text-blue-600 font-semibold mb-3">
                WorkforceComply
            </p>
            <h1 class="text-3xl md:text-4xl font-bold tracking-tight">Run Compliance Checks Individually</h1>
            <p class="text-slate-600 mt-3 max-w-2xl mx-auto">
                Upload your workforce file, run the check you need, and download a clean proof package for that specific run.
            </p>
        </div>

        <div class="soft-card p-6 md:p-8">

            <div class="mb-6">
                <label for="fileInput" class="block text-sm font-semibold text-slate-700 mb-2">
                    Upload Excel File
                </label>
                <input
                    id="fileInput"
                    type="file"
                    class="w-full border border-slate-300 bg-white p-3 rounded-xl"
                >
                <p class="text-sm text-slate-500 mt-2">
                    Use one employee file per run.
                </p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <button
                    id="oigBtn"
                    onclick="runChecks('oig')"
                    class="check-card bg-slate-900 text-white"
                >
                    <div class="text-base font-semibold">Run OIG</div>
                    <div class="text-sm text-slate-300 font-normal mt-1">Fast exclusion check</div>
                </button>

                <button
                    id="cnaBtn"
                    onclick="runChecks('cna')"
                    class="check-card bg-emerald-600 text-white"
                >
                    <div class="text-base font-semibold">Run CNA</div>
                    <div class="text-sm text-emerald-100 font-normal mt-1">Fast registry check</div>
                </button>

                <button
                    id="dswBtn"
                    onclick="runChecks('adverse')"
                    class="check-card bg-amber-600 text-white"
                >
                    <div class="text-base font-semibold">Run DSW</div>
                    <div class="text-sm text-amber-100 font-normal mt-1">Slower adverse check</div>
                </button>
            </div>

            <div id="statusCard" class="hidden rounded-2xl border border-slate-200 bg-slate-50 p-4 mb-5">
                <div id="status" class="text-sm text-slate-700"></div>
            </div>

            <div id="summary" class="hidden mb-5">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="bg-white border border-slate-200 rounded-2xl p-4 text-center shadow-sm">
                        <div class="text-xs uppercase tracking-wide text-slate-500">Total</div>
                        <div id="total" class="text-2xl font-bold text-slate-900 mt-1">0</div>
                    </div>
                    <div class="bg-white border border-slate-200 rounded-2xl p-4 text-center shadow-sm">
                        <div class="text-xs uppercase tracking-wide text-slate-500">Clear</div>
                        <div id="clear" class="text-2xl font-bold text-emerald-600 mt-1">0</div>
                    </div>
                    <div class="bg-white border border-slate-200 rounded-2xl p-4 text-center shadow-sm">
                        <div id="issuesLabel" class="text-xs uppercase tracking-wide text-slate-500">Issues</div>
                        <div id="flagged" class="text-2xl font-bold text-red-600 mt-1">0</div>
                    </div>
                    <div class="bg-white border border-slate-200 rounded-2xl p-4 text-center shadow-sm">
                        <div class="text-xs uppercase tracking-wide text-slate-500">Runtime</div>
                        <div id="runtime" class="text-xl font-bold text-slate-900 mt-1">0 sec</div>
                    </div>
                </div>
            </div>

            <div id="downloads" class="hidden">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <a id="zip"
                       class="block bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-xl text-center font-semibold shadow-sm transition">
                        Download ZIP
                    </a>
                    <a id="excel"
                       class="block bg-emerald-700 hover:bg-emerald-800 text-white p-4 rounded-xl text-center font-semibold shadow-sm transition">
                        Download Excel
                    </a>
                </div>
            </div>

        </div>

    </div>

</div>

<script>
const fileInput = document.getElementById("fileInput");
const statusCard = document.getElementById("statusCard");
const statusEl = document.getElementById("status");
const summary = document.getElementById("summary");
const downloads = document.getElementById("downloads");

const totalEl = document.getElementById("total");
const clearEl = document.getElementById("clear");
const flaggedEl = document.getElementById("flagged");
const runtimeEl = document.getElementById("runtime");
const issuesLabel = document.getElementById("issuesLabel");

const zipEl = document.getElementById("zip");
const excelEl = document.getElementById("excel");

const oigBtn = document.getElementById("oigBtn");
const cnaBtn = document.getElementById("cnaBtn");
const dswBtn = document.getElementById("dswBtn");

function setButtonsDisabled(disabled) {
    [oigBtn, cnaBtn, dswBtn].forEach(btn => {
        btn.disabled = disabled;
    });
}

function resetView() {
    statusCard.classList.add("hidden");
    summary.classList.add("hidden");
    downloads.classList.add("hidden");
    statusEl.innerText = "";
}

function getEndpoint(type) {
    if (type === "oig") return "/api/run-oig";
    if (type === "cna") return "/api/run-cna";
    if (type === "adverse") return "/api/run-adverse";
    return "";
}

function getIssueLabel(type) {
    if (type === "oig") return "OIG Issues";
    if (type === "cna") return "CNA Issues";
    if (type === "adverse") return "DSW Issues";
    return "Issues";
}

function getZipLabel(type) {
    if (type === "oig") return "Download OIG Report";
    if (type === "cna") return "Download CNA Report";
    if (type === "adverse") return "Download DSW Report";
    return "Download ZIP";
}

function getExcelLabel(type) {
    if (type === "oig") return "Download OIG Excel";
    if (type === "cna") return "Download CNA Excel";
    if (type === "adverse") return "Download DSW Excel";
    return "Download Excel";
}

function getRunningMessage(type) {
    if (type === "oig") return "Running OIG check...";
    if (type === "cna") return "Running CNA check...";
    if (type === "adverse") return "Running DSW check... this one usually takes longer.";
    return "Running...";
}

async function runChecks(type) {
    const file = fileInput.files[0];

    if (!file) {
        alert("Upload file first");
        return;
    }

    resetView();
    setButtonsDisabled(true);

    statusCard.classList.remove("hidden");
    statusEl.innerText = getRunningMessage(type);

    const formData = new FormData();
    formData.append("file", file);

    const start = performance.now();

    try {
        const endpoint = getEndpoint(type);

        const res = await fetch("https://workforcecomply-backend-docker.onrender.com" + endpoint, {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        if (!res.ok) {
            throw new Error(data.error || "Processing failed");
        }

        const end = performance.now();
        const seconds = ((end - start) / 1000).toFixed(1);

        statusEl.innerText = "Complete";
        summary.classList.remove("hidden");
        downloads.classList.remove("hidden");

        totalEl.innerText = data.summary.total_employees;
        clearEl.innerText = data.summary.clear_count;
        flaggedEl.innerText = data.summary.attention_needed;
        runtimeEl.innerText = seconds + " sec";
        issuesLabel.innerText = getIssueLabel(type);

        zipEl.href = data.downloads.combined_pdf_url;
        excelEl.href = data.downloads.results_excel_url;

        zipEl.innerText = getZipLabel(type);
        excelEl.innerText = getExcelLabel(type);

    } catch (error) {
        statusEl.innerText = "Error: " + error.message;
    } finally {
        setButtonsDisabled(false);
    }
}
</script>

</body>
</html>
